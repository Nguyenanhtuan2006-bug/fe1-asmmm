<body class="bg-white text-black font-sans">
  <main class="max-w-6xl mx-auto px-4 py-8 mt-4 md:mt-10">
    <nav class="text-gray-500 text-sm mb-6">
      <a routerLink="/" class="hover:text-black transition">Home</a> >
      <span class="text-black font-medium">Cart</span>
    </nav>

    <h1 class="text-4xl font-black uppercase mb-8">Your Cart</h1>

    <div class="flex flex-col lg:flex-row gap-6 items-start">
      <div class="w-full lg:w-[60%] border border-gray-200 rounded-[20px] p-4 md:p-6">
        @for (item of cartItems; track $index) {
          <div
            class="flex gap-4 border-b border-gray-200 pb-6 mb-6 last:border-0 last:pb-0 last:mb-0"
          >
            <div
              class="w-24 h-24 md:w-[124px] md:h-[124px] bg-[#F0EEED] rounded-xl flex items-center justify-center p-2 shrink-0"
            >
              <img
                [src]="item.image"
                [alt]="item.name"
                class="max-h-full object-contain mix-blend-multiply"
              />
            </div>

            <div class="flex-1 flex flex-col justify-between">
              <div class="flex justify-between items-start gap-2">
                <div>
                  <h3 class="font-bold text-lg md:text-xl text-gray-900 leading-tight">
                    {{ item.name }}
                  </h3>
                  <p class="text-sm text-gray-800 mt-1">
                    Size: <span class="text-gray-500">Large</span>
                  </p>
                  <p class="text-sm text-gray-800">
                    Color: <span class="text-gray-500">White</span>
                  </p>
                </div>

                <button
                  (click)="deleteItem($index)"
                  class="text-red-500 hover:text-red-700 transition-colors p-1"
                  title="Remove item"
                >
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="#ff3333">
                    <path
                      d="M3 6v2h18V6H3zm2 3v13c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V9H5zm4 2h2v9H9v-9zm4 0h2v9h-2v-9zM15.5 2.5l-1-1h-5l-1 1H5V5h14V2.5h-3.5z"
                    />
                  </svg>
                </button>
              </div>

              <div class="flex justify-between items-end mt-4">
                <span class="text-2xl font-bold text-black">${{ item.price }}</span>

                <div class="flex items-center bg-[#F0EEED] rounded-full px-4 py-2 gap-4">
                  <button
                    class="text-xl leading-none text-black hover:text-gray-600 transition"
                    (click)="decreaseQty($index)"
                  >
                    -
                  </button>

                  <span class="font-bold text-sm w-4 text-center">{{ item.quantity }}</span>

                  <button
                    class="text-xl leading-none text-black hover:text-gray-600 transition"
                    (click)="increaseQty($index)"
                  >
                    +
                  </button>
                </div>
              </div>
            </div>
          </div>
        } @empty {
          <div class="text-center py-10 text-gray-500 text-lg">
            Giỏ hàng của bạn đang trống.<br />
            <a
              routerLink="/"
              class="text-black font-bold underline mt-2 inline-block hover:text-gray-700"
              >Tiếp tục mua sắm</a
            >
          </div>
        }
      </div>

      <div class="w-full lg:w-[40%] border border-gray-200 rounded-[20px] p-5 md:p-6 sticky top-6">
        <h2 class="text-2xl font-bold mb-6 text-black">Order Summary</h2>

        <div class="flex justify-between items-center mb-6">
          <span class="text-lg text-gray-800">Total Price:</span>
          <span class="text-3xl font-bold text-black">${{ getTotal() | number: '1.0-0' }}</span>
        </div>

        <button
          class="w-full bg-black text-white rounded-full py-4 px-6 font-bold flex items-center justify-center gap-3 hover:bg-gray-800 transition"
        >
          Go to Checkout
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </main>
</body>
