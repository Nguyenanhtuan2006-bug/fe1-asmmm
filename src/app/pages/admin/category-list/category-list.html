<div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md border border-gray-200">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-black">Quản lý Danh Mục</h2>
    <button
      routerLink="/admin/category-add"
      class="bg-black text-white px-4 py-2 rounded-lg hover:bg-gray-800"
    >
      + Thêm danh mục
    </button>
  </div>

  <table class="w-full text-left border-collapse">
    <thead>
      <tr class="border-b-2 border-black">
        <th class="py-3 px-4 font-bold text-gray-700">ID</th>
        <th class="py-3 px-4 font-bold text-gray-700">Tên Danh Mục</th>
        <th class="py-3 px-4 font-bold text-gray-700 text-right">Hành động</th>
      </tr>
    </thead>
    <tbody>
      @for (cat of categories; track cat.id) {
        <tr class="border-b border-gray-200 hover:bg-gray-50">
          <td class="py-3 px-4">{{ cat.id }}</td>
          <td class="py-3 px-4 font-medium">{{ cat.name }}</td>
          <td class="py-3 px-4 text-right">
            <button
              [routerLink]="['/admin/category-edit', cat.id]"
              class="text-blue-600 hover:underline mr-4 font-medium"
            >
              Sửa
            </button>
            <button (click)="handleDelete(cat.id)" class="text-red-600 hover:underline font-medium">
              Xóa
            </button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="3" class="py-4 text-center text-gray-500">Không có danh mục nào.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
