<div class="max-w-6xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md border border-gray-200">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold text-black">Quản lý Sản Phẩm</h2>
      <button routerLink="/admin/product-add" class="bg-black text-white px-4 py-2 rounded-lg hover:bg-gray-800">
        + Thêm sản phẩm
      </button>
    </div>
  
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b-2 border-black">
            <th class="py-3 px-4 font-bold text-gray-700">ID</th>
            <th class="py-3 px-4 font-bold text-gray-700">Ảnh</th>
            <th class="py-3 px-4 font-bold text-gray-700">Tên Sản Phẩm</th>
            <th class="py-3 px-4 font-bold text-gray-700">Giá</th>
            <th class="py-3 px-4 font-bold text-gray-700">Danh Mục</th>
            <th class="py-3 px-4 font-bold text-gray-700 text-right">Hành động</th>
          </tr>
        </thead>
        <tbody>
          @for (prod of products; track prod.id) {
            <tr class="border-b border-gray-200 hover:bg-gray-50">
              <td class="py-3 px-4">{{ prod.id }}</td>
              <td class="py-3 px-4">
                <img [src]="prod.image" alt="img" class="w-16 h-16 object-cover rounded-md border border-gray-200">
              </td>
              <td class="py-3 px-4 font-medium">{{ prod.name }}</td>
              <td class="py-3 px-4 text-red-600 font-bold">${{ prod.price }}</td>
              <td class="py-3 px-4">{{ prod.categoryId }}</td>
              <td class="py-3 px-4 text-right min-w-[120px]">
                <a [routerLink]="['/admin/product-edit', prod.id]" class="text-blue-600 hover:underline mr-4 font-medium cursor-pointer">Sửa</a>
                <button (click)="handleDelete(prod.id)" class="text-red-600 hover:underline font-medium">Xóa</button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="6" class="py-4 text-center text-gray-500">Không có sản phẩm nào.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
